<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Compra de Carta Estilo UNO</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="scene">
    <section class="table">
      <div class="intro">
        <p class="eyebrow">Mini cenário</p>
        <h1>Compre uma carta aleatória</h1>
        <p class="description">
          Clique no baralho para revelar uma carta inspirada no estilo UNO.
        </p>
      </div>

      <div class="play-area">
        <button class="deck" id="draw-button" type="button" aria-label="Comprar uma carta do baralho">
          <span class="deck-stack deck-stack-one"></span>
          <span class="deck-stack deck-stack-two"></span>
          <span class="deck-face">
            <span class="deck-title">UNO</span>
            <span class="deck-subtitle">Clique para comprar</span>
          </span>
        </button>

        <article class="card-display is-hidden" id="drawn-card" aria-live="polite">
          <div class="card-flip" id="card-flip">
            <div class="card-shell card-back">
              <div class="card-back-mark">UNO</div>
              <div class="card-back-ring"></div>
              <div class="card-back-stripe"></div>
            </div>

            <div class="card-shell card-front" id="card-shell">
              <span class="card-label" id="card-color">Cor</span>
              <span class="corner-value corner-top" id="card-corner-top">0</span>

              <div class="card-centerpiece">
                <div class="card-orbit"></div>
                <div class="card-core">
                  <strong class="card-value" id="card-value">0</strong>
                </div>
              </div>

              <span class="corner-value corner-bottom" id="card-corner-bottom">0</span>
              <span class="card-type" id="card-type">Número</span>
            </div>
          </div>
          <p class="card-message" id="card-message">Nenhuma carta comprada ainda.</p>
        </article>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
