<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>UNA só Cefaléia</title>

  <style>
    body {
      text-align: center;
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      margin-top: 50px;
      perspective: 1000px;
    }

    h1 {
      margin-bottom: 20px;
    }

    img {
      margin-top: 20px;
      border-radius: 10px;
      cursor: pointer;
      width: 200px;
      backface-visibility: hidden;
      transform-style: preserve-3d;
    }

    .girando {
      animation: girarHorizontal 0.3s linear infinite;
    }

    @keyframes girarHorizontal {
      from { transform: rotateX(0deg); }
      to { transform: rotateX(360deg); }
    }

    #instrucao {
      margin-top: 20px;
      font-size: 18px;
      font-weight: bold;
      color: #333;
    }
  </style>
</head>
<body>
  <h1>UNA só Cefaléia</h1>

  <img id="carta" src="imagens/curinga.png" alt="Carta">

  <p id="instrucao">Você tem direito a dizer qual o diagnóstico provável</p>

  <script>
    const cartas = [
      {
        img: "imagens/2+.png",
        texto: "Você tem direito a 2 respostas NEGATIVAS"
      },
      {
        img: "imagens/4++.png",
        texto: "Você tem direito a 2 respostas POSITIVAS e 2 NEGATIVAS"
      },
      {
        img: "imagens/curinga.png",
        texto: "Você tem direito a dizer qual o diagnóstico provável"
      },
      {
        img: "imagens/pular.png",
        texto: "Passou a sua vez"
      },
      {
        img: "imagens/reverter.png",
        texto: "Retorne para o grupo anterior"
      }
    ];

    const cartaImg = document.getElementById("carta");
    const instrucao = document.getElementById("instrucao");
    let animando = false;

    function cartaAleatoria() {
      const indice = Math.floor(Math.random() * cartas.length);
      return cartas[indice];
    }

    function animarSorteio() {
      if (animando) return;
      animando = true;

      cartaImg.classList.add("girando");

      let tempo = 60;
      let repeticoes = 0;
      const maxRepeticoes = 12;

      function trocarCarta() {
        const carta = cartaAleatoria();
        cartaImg.src = carta.img;
        instrucao.textContent = carta.texto;
        repeticoes++;

        if (repeticoes < maxRepeticoes) {
          tempo += 20;
          setTimeout(trocarCarta, tempo);
        } else {
          cartaImg.classList.remove("girando");
          cartaImg.style.transform = "rotateX(0deg)";

          const cartaFinal = cartaAleatoria();
          cartaImg.src = cartaFinal.img;
          instrucao.textContent = cartaFinal.texto;

          animando = false;
        }
      }

      trocarCarta();
    }

    cartaImg.addEventListener("click", animarSorteio);
  </script>
</body>
</html>
